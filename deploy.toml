# tugboat deploy manifest — github.com/deepwa7er/tugboat
#   deploy:  tugboat deploy      (from this directory)
name = "ferry"
host = "deepwa7er"

[build]
# Static musl release build for the VPS. The target is installed on demand so a
# fresh dev machine works; the musl linker must be on PATH (see README).
cmd = "rustup target add x86_64-unknown-linux-musl >/dev/null 2>&1 || true; CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-musl-gcc cargo build --release --target x86_64-unknown-linux-musl"

[[artifacts]]
src = "target/x86_64-unknown-linux-musl/release/ferry"
dest = "/usr/local/bin/ferry"

[health]
# ferry listens on loopback; `tailscale serve` maps :8443 → 127.0.0.1:7777.
url = "http://127.0.0.1:7777/commands"

[lighthouse]
enroll = true

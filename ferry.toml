# ferry config. This file is bundled into the binary and written to
# ~/.config/ferry/ferry.toml on first run; edit it there (or pass a path as
# the first argument). Edits take effect immediately; `port` requires a restart.

port = 7777

# Used when the input matches no command. {query} is replaced with the
# percent-encoded input.
fallback = "https://www.google.com/search?q={query}"

[commands]
# Static shortcuts: `b mail` opens the URL directly.
mail = "https://mail.google.com"
cal = "https://calendar.google.com"
# A shortcut can point anywhere, including a self-hosted or tailnet service:
# home = "https://my-server.example.ts.net/"

# driftword — pronounceable fake-word generator (tailnet service via breakwater).
drift = "https://driftword.internal.deepwa7er.com"
words = "https://driftword.internal.deepwa7er.com"

# Fleet-wide dark/light theme (tide). `b dark` / `b light` set the global theme
# every fleet web UI honors; tide persists it, sets the shared cookie across
# *.internal.deepwa7er.com, and shows a confirmation page.
dark = "https://tide.internal.deepwa7er.com/set?theme=dark"
light = "https://tide.internal.deepwa7er.com/set?theme=light"

# Parameterized shortcuts: `b gh axum` searches GitHub for "axum".
gh = "https://github.com/search?q={query}"
yt = "https://www.youtube.com/results?search_query={query}"
w = "https://en.wikipedia.org/wiki/Special:Search?search={query}"

# Note capture: `b lg buy oat milk` POSTs the text to lagoon's capture API and
# shows a confirmation; `b lg` with no text just opens lagoon. `api` is lagoon's
# loopback endpoint on the VPS (ferry runs there too, so no TLS hop); `open` is
# its tailnet web UI. An explicit [commands] entry of the same name would win.
[capture]
keyword = "lg"
api = "http://127.0.0.1:8092/api/thoughts"
open = "https://lagoon.internal.deepwa7er.com"

# Authenticated POST actions: ferry makes the request itself (rather than
# redirecting the browser), so it can attach a bearer token that never reaches
# the browser. `b tug lighthouse` POSTs to tugboat serve's /deploy/{name} — the
# same endpoint the lighthouse dashboard's Deploy button uses — and shows a
# confirmation with tugboat's job id; `b tug` with no service opens lighthouse.
#
# tugboat serve runs on the dev machine (where the source + toolchain live),
# bound to its tailnet IP — the same address lighthouse uses for its Deploy
# button. To enable: set FERRY_TUGBOAT_TOKEN in ferry's environment to the same
# value as tugboat serve's TUGBOAT_SERVE_TOKEN, then uncomment. ferry refuses to
# start if token_env names a variable that isn't set, so it's never assumed.
# [[action]]
# keyword = "tug"
# url = "http://100.74.202.93:7878/deploy/{1}"
# token_env = "FERRY_TUGBOAT_TOKEN"
# open = "https://lighthouse.internal.deepwa7er.com"
